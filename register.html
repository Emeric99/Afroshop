<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung – Afroshop</title>
  <link rel="stylesheet" href="log_reg.css">
</head>
<body>
  <header></header>
  <div class="thebox">
    <h1>Jetzt registrieren</h1>
    <form id="registerFormular">

      <label for="firstname">Vorname</label>
      <input type="text" id="firstname" name="firstname" placeholder="Vorname" required><br>

      <label for="lastname">Nachname</label>
      <input type="text" id="lastname" name="lastname" placeholder="Nachname" required><br>

      <label for="gbdate">Geburtsdatum</label>
      <input type="date" id="gbdate" name="gbdate" required><br>

      <label for="username">Benutzername</label>
      <input type="text" id="username" name="username" placeholder="Benutzername" required><br>

      <label for="email">E-Mail</label>
      <input type="email" id="email" name="email" placeholder="beispiel@email.de" required><br>

      <label for="enterpass">Passwort</label>
      <input type="password" id="enterpass" name="enterpass" placeholder="Mindestens 8 Zeichen" minlength="8" required><br>

      <label for="confirmpass">Passwort bestätigen</label>
      <input type="password" id="confirmpass" name="confirmpass" placeholder="Passwort wiederholen" required><br>

      <button type="submit">Registrieren</button>
    </form>
  </div>
  <script src="log_reg.js"></script>
  <footer></footer>
</body>
</html>
