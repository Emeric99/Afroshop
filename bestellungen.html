<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellungen – Afroshop</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .orders-section {
            margin: 120px auto 40px;
            width: 80%;
        }

        .orders-section h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #1c1818;
        }

        .keine-bestellungen {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: #888;
        }

        .keine-bestellungen a {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background-color: #50b3a2;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .keine-bestellungen a:hover {
            background-color: #3b8c78;
        }

        .bestellung-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .bestellung-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1c1818;
            color: #fff;
            padding: 14px 20px;
        }

        .bestellung-header .bestell-nr {
            font-weight: 700;
            font-size: 1rem;
            color: #50b3a2;
        }

        .bestellung-header .bestell-datum {
            font-size: 0.85rem;
            color: #aaa;
        }

        .bestellung-artikel {
            list-style: none;
            padding: 0;
        }

        .bestellung-artikel li {
            display: grid;
            grid-template-columns: 70px 1fr auto auto;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .bestellung-artikel li:last-child {
            border-bottom: none;
        }

        .bestellung-artikel img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .artikel-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .artikel-menge {
            color: #888;
            font-size: 0.9rem;
        }

        .artikel-preis {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        .bestellung-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .bestellung-footer .status {
            font-size: 0.85rem;
            color: #50b3a2;
            font-weight: 600;
        }

        .bestellung-footer .gesamt {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1c1818;
        }

        .alle-loeschen {
            margin-bottom: 20px;
        }

        .alle-loeschen button {
            background: none;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #888;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .alle-loeschen button:hover {
            border-color: #e07b39;
            color: #e07b39;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Asia &amp; Afrika Shop</h1>
            <nav>
                <ul>
                    <li><a href="index1.html">Home</a></li>
                    <li><a href="produkte.html">Produkte</a></li>
                    <li><a href="bestellungen.html">Bestellungen</a></li>
                    <li><a href="position.html">Position</a></li>
                    <li><a href="ueber.html">Über uns</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="orders-section">
        <h2>Meine Bestellungen</h2>
        <div class="alle-loeschen">
            <button onclick="alleLoeschen()">Alle Bestellungen löschen</button>
        </div>
        <div id="bestellungen-container"></div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Afroshop. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script>
        function bestellungenAnzeigen() {
            var container = document.getElementById('bestellungen-container');
            var bestellungen = JSON.parse(localStorage.getItem('afroshop_bestellungen') || '[]');

            if (bestellungen.length === 0) {
                container.innerHTML = `
                    <div class="keine-bestellungen">
                        <p>Du hast noch keine Bestellungen aufgegeben.</p>
                        <a href="produkte.html">Jetzt einkaufen</a>
                    </div>`;
                return;
            }

            // Neueste Bestellung zuerst
            var sortiert = bestellungen.slice().reverse();

            container.innerHTML = sortiert.map(function (bestellung) {
                var artikelHTML = bestellung.artikel.map(function (item) {
                    return `
                        <li>
                            <img src="img/${item.image}" alt="${item.name}">
                            <span class="artikel-name">${item.name}</span>
                            <span class="artikel-menge">x${item.quantity}</span>
                            <span class="artikel-preis">${(item.price * item.quantity).toFixed(2)} €</span>
                        </li>`;
                }).join('');

                return `
                    <div class="bestellung-card">
                        <div class="bestellung-header">
                            <span class="bestell-nr">${bestellung.id}</span>
                            <span class="bestell-datum">${bestellung.datum} um ${bestellung.uhrzeit}</span>
                        </div>
                        <ul class="bestellung-artikel">
                            ${artikelHTML}
                        </ul>
                        <div class="bestellung-footer">
                            <span class="status">✓ Bestellung eingegangen</span>
                            <span class="gesamt">Gesamt: ${bestellung.gesamtpreis} €</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function alleLoeschen() {
            if (confirm('Alle Bestellungen wirklich löschen?')) {
                localStorage.removeItem('afroshop_bestellungen');
                bestellungenAnzeigen();
            }
        }

        bestellungenAnzeigen();
    </script>
</body>
</html>
